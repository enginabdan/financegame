<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Dashboard | Hustle & Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <h1>Teacher Dashboard</h1>
        <p>Monitor student runs, outcomes, and day-by-day decisions.</p>
      </section>

      <section class="panel">
        <h2>Access</h2>
        <div class="grid two">
          <label>
            API Base URL
            <input id="apiBase" value="http://127.0.0.1:8000" />
          </label>
          <label>
            Teacher Key
            <input id="teacherKey" type="password" />
          </label>
        </div>
        <label style="display: flex; align-items: center; gap: 8px; margin-top: 10px; font-weight: 600">
          <input id="rememberAccess" type="checkbox" style="width: auto" />
          Remember API URL and Teacher Key on this browser
        </label>
        <button id="loadBtn">Load Dashboard</button>
      </section>

      <section class="panel">
        <h2>Class Setup</h2>
        <div class="grid two">
          <label>
            Class Name
            <input id="classNameInput" placeholder="e.g., Finance Period 3" />
          </label>
          <div>
            <button id="createClassBtn">Create Class</button>
          </div>
        </div>
        <div id="classList" class="log" style="margin-top: 12px"></div>
      </section>

      <section class="panel">
        <h2>Assignment Setup</h2>
        <div class="grid two">
          <label>
            Class Code
            <input id="assignClassCodeInput" placeholder="e.g., A1B2C3" />
          </label>
          <label>
            Assignment Title
            <input id="assignTitleInput" placeholder="Week 1 Budget Challenge" />
          </label>
        </div>
        <div class="grid three" style="margin-top: 10px">
          <label>
            City
            <input id="assignCityInput" value="Charlotte, NC" />
          </label>
          <label>
            Start Cash
            <input id="assignStartCashInput" type="number" value="1800" min="200" max="10000" />
          </label>
          <label>
            Duration (days)
            <input id="assignDurationInput" type="number" value="30" min="7" max="90" />
          </label>
        </div>
        <button id="createAssignmentBtn">Create Assignment</button>
        <div id="assignmentList" class="log" style="margin-top: 12px"></div>
      </section>

      <section class="panel">
        <h2>Overview</h2>
        <div id="overview" class="stats"></div>
      </section>

      <section class="panel">
        <h2>Sessions</h2>
        <div id="sessions" class="log"></div>
      </section>

      <section class="panel">
        <h2>Selected Session Logs</h2>
        <div id="logs" class="log"></div>
      </section>
    </main>

    <script src="./runtime-config.js"></script>
    <script src="./teacher.js"></script>
  </body>
</html>
